{% extends "doctors/base.html" %}

{% block content %}

<div style="min-height: 100vh; display: flex; justify-content: center; align-items: center; background: linear-gradient(135deg, #f4f8ff, #eaf2ff); padding: 30px;">

  <div style="
      width: 100%;
      max-width: 700px;
      background: #ffffff;
      border-radius: 20px;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.08);
      padding: 35px;
      border: 1px solid #e5e7eb;
  ">

    <!-- Heading -->
    <div style="text-align: center; margin-bottom: 28px;">
      <h2 style="margin: 0; font-size: 30px; font-weight: 700; color: #1e3a8a;">
        Add Consultation Note
      </h2>
      <p style="margin-top: 10px; color: #6b7280; font-size: 15px;">
        Patient: 
        <span style="font-weight: 600; color: #111827;">
          {{ patient.user.first_name }} {{ patient.user.last_name }}
        </span>
      </p>
    </div>

    <!-- Form -->
    <form method="post">
      {% csrf_token %}

      <!-- Title -->
      <div style="margin-bottom: 20px;">
        <label style="display: block; margin-bottom: 8px; font-weight: 600; color: #374151;">
          Note Title
        </label>
        <input 
          type="text" 
          name="title" 
          placeholder="Enter note title"
          required
          style="
            width: 100%;
            padding: 14px 16px;
            border: 1px solid #d1d5db;
            border-radius: 12px;
            font-size: 15px;
            outline: none;
            box-sizing: border-box;
          "
        >
      </div>

      <!-- Notes -->
      <div style="margin-bottom: 24px;">
        <label style="display: block; margin-bottom: 8px; font-weight: 600; color: #374151;">
          Consultation Notes
        </label>
        <textarea 
          name="notes"
          rows="8"
          placeholder="Write consultation details, diagnosis, recommendations, medicines, follow-up instructions..."
          required
          style="
            width: 100%;
            padding: 14px 16px;
            border: 1px solid #d1d5db;
            border-radius: 12px;
            font-size: 15px;
            outline: none;
            resize: vertical;
            box-sizing: border-box;
          "
        ></textarea>
      </div>

      <!-- Buttons -->
      <div style="display: flex; justify-content: space-between; align-items: center; gap: 12px; flex-wrap: wrap;">
        
        <a href="{% url 'doctor_patients' %}" style="
            text-decoration: none;
            background: #f3f4f6;
            color: #374151;
            padding: 12px 20px;
            border-radius: 12px;
            font-weight: 600;
            display: inline-block;
        ">
          ← Back
        </a>

        <button type="submit" style="
            border: none;
            background: linear-gradient(135deg, #16a34a, #15803d);
            color: #fff;
            padding: 13px 26px;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 8px 18px rgba(22, 163, 74, 0.25);
        ">
          Save Note
        </button>
      </div>
    </form>

  </div>
</div>

{% endblock %}
