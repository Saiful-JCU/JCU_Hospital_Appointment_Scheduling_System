{% extends "patients/base.html" %}
{% block content %}

<div class="container mt-4">
    <div class="card shadow-sm">
        <div class="card-body">
            <h2 class="card-title mb-3">{{ note.title }}</h2>

            <p class="text-muted mb-1">
                <strong>Doctor:</strong>
                Dr. {{ note.doctor.user.first_name }} {{ note.doctor.user.last_name }}
            </p>

            <p class="text-muted mb-3">
                <strong>Created:</strong>
                {{ note.created_at|date:"M d, Y h:i A" }}
            </p>

            <hr>

            <div class="mt-3">
                <p style="white-space: pre-line;">{{ note.notes }}</p>
            </div>

            <a href="{% url 'my_consultation_notes' %}" class="btn btn-secondary mt-3">
                Back to My Notes
            </a>
        </div>
    </div>
</div>

{% endblock %}
