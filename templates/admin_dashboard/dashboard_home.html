{% extends 'admin_dashboard/base.html' %}
{% block content %}

<div class="container mt-5">
    <h2 class="mb-4">Admin Dashboard</h2>

    <div class="row g-4">
        <div class="col-md-3">
            <div class="card shadow p-3 text-center">
                <h5>Total Departments</h5>
                <h2>{{ total_departments }}</h2>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card shadow p-3 text-center">
                <h5>Total Doctors</h5>
                <h2>{{ total_doctors }}</h2>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card shadow p-3 text-center">
                <h5>Total Patients</h5>
                <h2>{{ total_patients }}</h2>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card shadow p-3 text-center">
                <h5>Total Appointments</h5>
                <h2>{{ total_appointments }}</h2>
            </div>
        </div>
    </div>

    <div class="mt-4">
        <a href="{% url 'admin_department_list' %}" class="btn btn-primary">
            Manage Departments
        </a>
    </div>
</div>

{% endblock %}
