{% extends "users/base.html" %}

{% load static %}

{% block content %}

  <style>
    .blog-grid {
        display: grid;
        grid-template-columns: repeat(1, minmax(0, 1fr));
        gap: 24px;
        margin-top: 80px;
    }

    @media (min-width: 768px) {
        .blog-grid {
            grid-template-columns: repeat(2, minmax(0, 1fr));
        }
    }

    @media (min-width: 1024px) {
        .blog-grid {
            grid-template-columns: repeat(3, minmax(0, 1fr));
        }
    }


      .blog-thumb {
          width: 100%;
          height: 220px;
          overflow: hidden;
          border-radius: 12px 12px 0 0; /* optional if card has rounded top */
          position: relative;
      }

      .blog-thumb-img {
          width: 100%;
          height: 100%;
          object-fit: cover;
          display: block;
          transition: transform 0.4s ease, filter 0.4s ease;
      }

      /* hover effect */
      .blog-thumb:hover .blog-thumb-img {
          transform: scale(1.08);
          filter: brightness(0.95);
      }

      /* tablet */
      @media (max-width: 991px) {
          .blog-thumb {
              height: 200px;
          }
      }

      /* mobile */
      @media (max-width: 767px) {
          .blog-thumb {
              height: 180px;
          }
      }

      /* small mobile */
      @media (max-width: 480px) {
          .blog-thumb {
              height: 160px;
          }
      }
  </style>



      {% if blogs %}

        <div class="blog-grid">

          {% for blog in blogs %}
            <div class="bg-white rounded-lg shadow-md overflow-hidden">
              <div class="blog-thumb">
                    <img src="{{ blog.thumbnail.url }}" alt="{{ blog.title }}" class="blog-thumb-img">
                </div>
                <div class="p-4">
                <h3 class="text-lg font-semibold mb-2">{{ blog.title }}</h3>
                <p class="text-gray-600 mb-4">{{ blog.summary|truncatewords:20 }}</p>
                <a href="{% url 'blog' blog.blog_id %}" class="text-blue-500 hover:underline">Read More</a>
              </div>
            </div>
          {% endfor %}

        </div>


      {% else %}
        <div class="text-center text-muted">
          <p>No blogs available right now.</p>
        </div>
      {% endif %}
    </section>

{% endblock content %}
